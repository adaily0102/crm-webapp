<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Management - CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <header class="bg-indigo-600 text-white p-5 flex justify-between items-center shadow">
    <h1 class="text-2xl font-bold">👔 HR Management</h1>
    <button onclick="logout()" class="bg-white text-indigo-600 px-5 py-2 rounded-lg font-medium">Logout</button>
  </header>

  <div class="flex">
    <div class="w-64 bg-gray-800 text-white h-screen fixed">
      <div class="p-6">
        <h3 class="text-lg font-semibold mb-6 text-gray-300">MAIN MENU</h3>
        <ul class="space-y-2">
          <li onclick="goTo('dashboard.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">🏠 Dashboard</li>
          <li onclick="goTo('contacts.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👥 Contacts</li>
          <li onclick="goTo('activities.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📅 Activities</li>
          <li onclick="goTo('sales.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">💰 Sales</li>
          <li onclick="goTo('invoices.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📄 Invoices</li>
          <li class="bg-indigo-700 p-4 rounded-xl font-medium">👔 HR</li>
        </ul>
      </div>
    </div>

    <div class="ml-64 flex-1 p-8">
      <!-- Add Employee Form -->
      <div class="bg-white rounded-2xl shadow p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4">Add New Employee</h2>
        <form id="employeeForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Full Name</label>
            <input type="text" id="empName" class="w-full border rounded-lg p-3" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Role / Position</label>
            <input type="text" id="empRole" class="w-full border rounded-lg p-3" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Capacity (Hours/Month)</label>
            <input type="number" id="capacity" value="160" class="w-full border rounded-lg p-3" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Status</label>
            <select id="status" class="w-full border rounded-lg p-3">
              <option value="Active">Active</option>
              <option value="On Leave">On Leave</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1">Discipline / Performance Notes</label>
            <textarea id="notes" rows="3" class="w-full border rounded-lg p-3" placeholder="Remarks..."></textarea>
          </div>
          <div class="md:col-span-2 mt-4">
            <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700">Add Employee</button>
          </div>
        </form>
      </div>

      <!-- Search -->
      <div class="mb-6">
        <input type="text" id="searchInput" 
               class="w-full max-w-md border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-indigo-500"
               placeholder="🔍 Search by name or role...">
      </div>

      <h2 class="text-2xl font-bold mb-4">Employee List</h2>
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full" id="hrTable">
          <thead class="bg-gray-50">
            <tr>
              <th class="text-left p-4">Name</th>
              <th class="text-left p-4">Role</th>
              <th class="text-center p-4">Capacity</th>
              <th class="text-center p-4">Status</th>
              <th class="text-left p-4">Notes</th>
              <th class="text-center p-4">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

    window.logout = async () => { await signOut(auth); window.location.href = "index.html"; };
    window.goTo = (page) => window.location.href = page;

    // Save Employee
    document.getElementById("employeeForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await addDoc(collection(db, "employees"), {
          name: document.getElementById("empName").value,
          role: document.getElementById("empRole").value,
          capacity: parseInt(document.getElementById("capacity").value),
          status: document.getElementById("status").value,
          notes: document.getElementById("notes").value,
          createdAt: serverTimestamp(),
          userId: auth.currentUser.uid
        });
        alert("✅ Employee added successfully!");
        e.target.reset();
      } catch (error) { alert("Error: " + error.message); }
    });

    // Search + Table
    const tbody = document.querySelector("#hrTable tbody");
    const searchInput = document.getElementById("searchInput");
    let allEmployees = [];

    onSnapshot(collection(db, "employees"), (snapshot) => {
      allEmployees = [];
      snapshot.forEach(doc => allEmployees.push({ id: doc.id, ...doc.data() }));
      renderEmployees(allEmployees);
    });

    function renderEmployees(employees) {
      tbody.innerHTML = "";
      employees.forEach(item => {
        const row = document.createElement("tr");
        row.className = "hover:bg-gray-50";
        row.innerHTML = `
          <td class="p-4 font-medium">${item.name}</td>
          <td class="p-4">${item.role}</td>
          <td class="p-4 text-center">${item.capacity} hrs</td>
          <td class="p-4 text-center">
            <span class="px-4 py-1 rounded-full text-sm ${item.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
              ${item.status}
            </span>
          </td>
          <td class="p-4">${item.notes || '-'}</td>
          <td class="p-4 text-center">
            <button onclick="deleteEmployee('${item.id}')" class="text-red-600 hover:text-red-800">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase();
      const filtered = allEmployees.filter(emp => 
        emp.name.toLowerCase().includes(term) || 
        emp.role.toLowerCase().includes(term)
      );
      renderEmployees(filtered);
    });

    window.deleteEmployee = async (id) => {
      if (confirm("Delete this employee?")) {
        await deleteDoc(doc(db, "employees", id));
      }
    };
  </script>
</body>
</html>
