<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities - CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <header class="bg-indigo-600 text-white p-5 flex justify-between items-center shadow">
    <h1 class="text-2xl font-bold">📅 Activities</h1>
    <button onclick="logout()" class="bg-white text-indigo-600 px-5 py-2 rounded-lg font-medium">Logout</button>
  </header>

  <div class="flex">
    <div class="w-64 bg-gray-800 text-white h-screen fixed">
      <div class="p-6">
        <h3 class="text-lg font-semibold mb-6 text-gray-300">MAIN MENU</h3>
        <ul class="space-y-2">
          <li onclick="goTo('dashboard.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">🏠 Dashboard</li>
          <li onclick="goTo('contacts.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👥 Contacts</li>
          <li class="bg-indigo-700 p-4 rounded-xl font-medium">📅 Activities</li>
          <li onclick="goTo('sales.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">💰 Sales</li>
          <li onclick="goTo('invoices.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📄 Invoices</li>
          <li onclick="goTo('hr.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👔 HR</li>
        </ul>
      </div>
    </div>

    <div class="ml-64 flex-1 p-8">
      <div class="bg-white rounded-2xl shadow p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4">Add New Activity</h2>
        <form id="activityForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Action Type</label>
            <select id="actionType" class="w-full border rounded-lg p-3" required>
              <option value="">-- Select --</option>
              <option value="Call">📞 Call</option>
              <option value="Meeting">🤝 Meeting</option>
              <option value="Email">✉️ Email</option>
              <option value="Follow-up">🔄 Follow-up</option>
              <option value="Site Visit">📍 Site Visit</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Date & Time</label>
            <input type="datetime-local" id="activityDate" class="w-full border rounded-lg p-3" required>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1">Notes</label>
            <textarea id="notes" rows="3" class="w-full border rounded-lg p-3" placeholder="Details..."></textarea>
          </div>
          <div class="md:col-span-2">
            <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700">Save Activity</button>
          </div>
        </form>
      </div>

      <div class="mb-6">
        <input type="text" id="searchInput" 
               class="w-full max-w-md border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-indigo-500"
               placeholder="🔍 Search activities...">
      </div>

      <h2 class="text-2xl font-bold mb-4">All Activities</h2>
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full" id="activitiesTable">
          <thead class="bg-gray-50">
            <tr>
              <th class="text-left p-4">Date & Time</th>
              <th class="text-left p-4">Action</th>
              <th class="text-left p-4">Notes</th>
              <th class="text-center p-4">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

    window.logout = async () => { await signOut(auth); window.location.href = "index.html"; };
    window.goTo = (page) => window.location.href = page;

    // Save Activity
    document.getElementById("activityForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await addDoc(collection(db, "activities"), {
          actionType: document.getElementById("actionType").value,
          activityDate: document.getElementById("activityDate").value,
          notes: document.getElementById("notes").value,
          createdAt: serverTimestamp(),
          userId: auth.currentUser.uid
        });
        alert("✅ Activity saved!");
        e.target.reset();
      } catch (error) { alert("Error: " + error.message); }
    });

    // Search + Table
    const tbody = document.querySelector("#activitiesTable tbody");
    const searchInput = document.getElementById("searchInput");
    let allActivities = [];

    onSnapshot(collection(db, "activities"), (snapshot) => {
      allActivities = [];
      snapshot.forEach(doc => allActivities.push({ id: doc.id, ...doc.data() }));
      renderActivities(allActivities);
    });

    function renderActivities(activities) {
      tbody.innerHTML = "";
      activities.forEach(item => {
        const row = document.createElement("tr");
        row.className = "hover:bg-gray-50";
        row.innerHTML = `
          <td class="p-4">${new Date(item.activityDate).toLocaleString('en-MY')}</td>
          <td class="p-4 font-medium">${item.actionType}</td>
          <td class="p-4">${item.notes || '-'}</td>
          <td class="p-4 text-center">
            <button onclick="deleteActivity('${item.id}')" class="text-red-600 hover:text-red-800">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase();
      const filtered = allActivities.filter(a => 
        a.actionType.toLowerCase().includes(term) || 
        (a.notes && a.notes.toLowerCase().includes(term))
      );
      renderActivities(filtered);
    });

    window.deleteActivity = async (id) => {
      if (confirm("Delete this activity?")) {
        await deleteDoc(doc(db, "activities", id));
      }
    };
  </script>
</body>
</html>
