<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts - CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Header -->
  <header class="bg-indigo-600 text-white p-5 flex justify-between items-center shadow">
    <h1 class="text-2xl font-bold">👥 Contacts</h1>
    <button onclick="logout()" 
            class="bg-white text-indigo-600 px-5 py-2 rounded-lg font-medium hover:bg-gray-100">
      Logout
    </button>
  </header>

  <div class="flex">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 text-white h-screen fixed">
      <div class="p-6">
        <h3 class="text-lg font-semibold mb-6 text-gray-300">MAIN MENU</h3>
        <ul class="space-y-2">
          <li onclick="goTo('dashboard.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">🏠 Dashboard</li>
          <li class="bg-indigo-700 p-4 rounded-xl font-medium">👥 Contacts</li>
          <li onclick="goTo('activities.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📅 Activities</li>
          <li onclick="goTo('sales.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">💰 Sales</li>
          <li onclick="goTo('invoices.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📄 Invoices</li>
          <li onclick="goTo('hr.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👔 HR</li>
        </ul>
      </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 flex-1 p-8">
      
      <!-- Add New Contact Form -->
      <div class="bg-white rounded-2xl shadow p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4">Add New Contact</h2>
        <form id="contactForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Full Name</label>
            <input type="text" id="name" class="w-full border rounded-lg p-3" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Company Name</label>
            <input type="text" id="company" class="w-full border rounded-lg p-3">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <input type="email" id="email" class="w-full border rounded-lg p-3">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Phone Number</label>
            <input type="tel" id="phone" class="w-full border rounded-lg p-3">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Status</label>
            <select id="status" class="w-full border rounded-lg p-3">
              <option value="Lead">Lead</option>
              <option value="Prospect">Prospect</option>
              <option value="Customer">Customer</option>
            </select>
          </div>
          <div class="md:col-span-2 mt-4">
            <button type="submit" 
                    class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 font-medium">
              Save Contact
            </button>
          </div>
        </form>
      </div>

      <!-- Search Bar -->
      <div class="mb-6">
        <input type="text" id="searchInput" 
               class="w-full max-w-md border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-indigo-500"
               placeholder="🔍 Search by name, company or email...">
      </div>

      <!-- Contacts Table -->
      <h2 class="text-2xl font-bold mb-4">All Contacts</h2>
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full" id="contactsTable">
          <thead class="bg-gray-50">
            <tr>
              <th class="text-left p-4">Name</th>
              <th class="text-left p-4">Company</th>
              <th class="text-left p-4">Email</th>
              <th class="text-left p-4">Phone</th>
              <th class="text-left p-4">Status</th>
              <th class="text-center p-4">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "index.html";
    });

    window.logout = async () => {
      await signOut(auth);
      window.location.href = "index.html";
    };

    window.goTo = (page) => window.location.href = page;

    // === Save New Contact ===
    document.getElementById("contactForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      try {
        await addDoc(collection(db, "contacts"), {
          name: document.getElementById("name").value,
          company: document.getElementById("company").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          status: document.getElementById("status").value,
          createdAt: serverTimestamp(),
          userId: auth.currentUser.uid
        });

        alert("✅ Contact saved successfully!");
        e.target.reset();
      } catch (error) {
        alert("Error: " + error.message);
      }
    });

    // === Real-time Data + Search ===
    const tbody = document.querySelector("#contactsTable tbody");
    const searchInput = document.getElementById("searchInput");
    let allContacts = [];

    onSnapshot(collection(db, "contacts"), (snapshot) => {
      allContacts = [];
      snapshot.forEach((doc) => {
        allContacts.push({ id: doc.id, ...doc.data() });
      });
      renderContacts(allContacts);
    });

    function renderContacts(contacts) {
      tbody.innerHTML = "";
      
      contacts.forEach((item) => {
        const row = document.createElement("tr");
        row.className = "hover:bg-gray-50";

        row.innerHTML = `
          <td class="p-4 font-medium">${item.name}</td>
          <td class="p-4">${item.company || '-'}</td>
          <td class="p-4">${item.email || '-'}</td>
          <td class="p-4">${item.phone || '-'}</td>
          <td class="p-4">
            <span class="px-3 py-1 rounded-full text-sm ${item.status === 'Customer' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
              ${item.status}
            </span>
          </td>
          <td class="p-4 text-center">
            <button onclick="deleteContact('${item.id}')" 
                    class="text-red-600 hover:text-red-800 font-medium">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Search Function
    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase().trim();
      
      const filtered = allContacts.filter(contact => 
        contact.name.toLowerCase().includes(term) ||
        (contact.company && contact.company.toLowerCase().includes(term)) ||
        (contact.email && contact.email.toLowerCase().includes(term))
      );
      
      renderContacts(filtered);
    });

    // Delete Contact
    window.deleteContact = async (id) => {
      if (confirm("Are you sure you want to delete this contact?")) {
        try {
          await deleteDoc(doc(db, "contacts", id));
        } catch (error) {
          alert("Error deleting contact: " + error.message);
        }
      }
    };
  </script>
</body>
</html>
