<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Pipeline - CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <header class="bg-indigo-600 text-white p-5 flex justify-between items-center shadow">
    <h1 class="text-2xl font-bold">💰 Sales Pipeline</h1>
    <button onclick="logout()" class="bg-white text-indigo-600 px-5 py-2 rounded-lg font-medium">Logout</button>
  </header>

  <div class="flex">
    <div class="w-64 bg-gray-800 text-white h-screen fixed">
      <div class="p-6">
        <h3 class="text-lg font-semibold mb-6 text-gray-300">MAIN MENU</h3>
        <ul class="space-y-2">
          <li onclick="goTo('dashboard.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">🏠 Dashboard</li>
          <li onclick="goTo('contacts.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👥 Contacts</li>
          <li onclick="goTo('activities.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📅 Activities</li>
          <li class="bg-indigo-700 p-4 rounded-xl font-medium">💰 Sales Pipeline</li>
          <li onclick="goTo('invoices.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📄 Invoices</li>
          <li onclick="goTo('hr.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👔 HR</li>
        </ul>
      </div>
    </div>

    <div class="ml-64 flex-1 p-8">
      <div class="bg-white rounded-2xl shadow p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4">Add New Deal</h2>
        <form id="dealForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1">Deal Title</label>
            <input type="text" id="dealTitle" class="w-full border rounded-lg p-3" required placeholder="e.g. Website for ABC Sdn Bhd">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Contact</label>
            <select id="contactId" class="w-full border rounded-lg p-3" required></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Deal Value (RM)</label>
            <input type="number" id="dealValue" class="w-full border rounded-lg p-3" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Stage</label>
            <select id="stage" class="w-full border rounded-lg p-3" required>
              <option value="Lead">Lead</option>
              <option value="Proposal">Proposal Sent</option>
              <option value="Negotiation">Negotiation</option>
              <option value="Closed">Closed Won</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Expected Close Date</label>
            <input type="date" id="closeDate" class="w-full border rounded-lg p-3">
          </div>
          <div class="md:col-span-2 mt-4">
            <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700">Save Deal</button>
          </div>
        </form>
      </div>

      <div class="mb-6">
        <input type="text" id="searchInput" 
               class="w-full max-w-md border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-indigo-500"
               placeholder="🔍 Search deal title...">
      </div>

      <h2 class="text-2xl font-bold mb-4">Current Pipeline</h2>
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full" id="dealsTable">
          <thead class="bg-gray-50">
            <tr>
              <th class="text-left p-4">Deal Title</th>
              <th class="text-left p-4">Contact Name</th>
              <th class="text-right p-4">Value (RM)</th>
              <th class="text-center p-4">Stage</th>
              <th class="text-center p-4">Close Date</th>
              <th class="text-center p-4">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

    window.logout = async () => { await signOut(auth); window.location.href = "index.html"; };
    window.goTo = (page) => window.location.href = page;

    let contactsMap = {};   // 用來存 contactId -> name

    // 載入所有 Contacts 建立對照表
    onSnapshot(collection(db, "contacts"), (snapshot) => {
      contactsMap = {};
      const select = document.getElementById("contactId");
      select.innerHTML = '<option value="">-- Select Contact --</option>';

      snapshot.forEach(doc => {
        const data = doc.data();
        contactsMap[doc.id] = data.name || "Unknown";
        
        const option = document.createElement("option");
        option.value = doc.id;
        option.textContent = data.name + (data.company ? ` (${data.company})` : '');
        select.appendChild(option);
      });
    });

    // Save Deal
    document.getElementById("dealForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await addDoc(collection(db, "deals"), {
          title: document.getElementById("dealTitle").value,
          contactId: document.getElementById("contactId").value,
          value: parseFloat(document.getElementById("dealValue").value),
          stage: document.getElementById("stage").value,
          closeDate: document.getElementById("closeDate").value,
          createdAt: serverTimestamp(),
          userId: auth.currentUser.uid
        });
        alert("✅ Deal saved successfully!");
        e.target.reset();
      } catch (error) { 
        alert("Error: " + error.message); 
      }
    });

    // Display Deals with Contact Name
    const tbody = document.querySelector("#dealsTable tbody");
    const searchInput = document.getElementById("searchInput");
    let allDeals = [];

    onSnapshot(collection(db, "deals"), (snapshot) => {
      allDeals = [];
      snapshot.forEach(doc => {
        allDeals.push({ id: doc.id, ...doc.data() });
      });
      renderDeals(allDeals);
    });

    function renderDeals(deals) {
      tbody.innerHTML = "";
      deals.forEach(item => {
        const contactName = contactsMap[item.contactId] || "Unknown Contact";
        
        const row = document.createElement("tr");
        row.className = "hover:bg-gray-50";
        row.innerHTML = `
          <td class="p-4 font-medium">${item.title}</td>
          <td class="p-4">${contactName}</td>
          <td class="p-4 text-right font-medium">RM ${item.value ? item.value.toLocaleString() : '0'}</td>
          <td class="p-4 text-center">
            <span class="px-4 py-1 rounded-full text-sm font-medium ${item.stage === 'Closed' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
              ${item.stage}
            </span>
          </td>
          <td class="p-4 text-center">${item.closeDate || '-'}</td>
          <td class="p-4 text-center">
            <button onclick="deleteDeal('${item.id}')" class="text-red-600 hover:text-red-800">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase();
      const filtered = allDeals.filter(d => d.title.toLowerCase().includes(term));
      renderDeals(filtered);
    });

    window.deleteDeal = async (id) => {
      if (confirm("Delete this deal?")) {
        await deleteDoc(doc(db, "deals", id));
      }
    };
  </script>
</body>
</html>
