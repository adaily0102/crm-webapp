<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices - CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <header class="bg-indigo-600 text-white p-5 flex justify-between items-center shadow">
    <h1 class="text-2xl font-bold">📄 Invoices</h1>
    <button onclick="logout()" class="bg-white text-indigo-600 px-5 py-2 rounded-lg font-medium">Logout</button>
  </header>

  <div class="flex">
    <div class="w-64 bg-gray-800 text-white h-screen fixed">
      <div class="p-6">
        <h3 class="text-lg font-semibold mb-6 text-gray-300">MAIN MENU</h3>
        <ul class="space-y-2">
          <li onclick="goTo('dashboard.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">🏠 Dashboard</li>
          <li onclick="goTo('contacts.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👥 Contacts</li>
          <li onclick="goTo('activities.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">📅 Activities</li>
          <li onclick="goTo('sales.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">💰 Sales</li>
          <li class="bg-indigo-700 p-4 rounded-xl font-medium">📄 Invoices</li>
          <li onclick="goTo('hr.html')" class="hover:bg-gray-700 p-4 rounded-xl cursor-pointer">👔 HR</li>
        </ul>
      </div>
    </div>

    <div class="ml-64 flex-1 p-8">
      <div class="bg-white rounded-2xl shadow p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4">Create New Invoice</h2>
        <form id="invoiceForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1">Select Deal</label>
            <select id="dealId" class="w-full border rounded-lg p-3" required></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Amount (RM)</label>
            <input type="number" id="amount" class="w-full border rounded-lg p-3" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Due Date</label>
            <input type="date" id="dueDate" class="w-full border rounded-lg p-3" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Status</label>
            <select id="status" class="w-full border rounded-lg p-3">
              <option value="Pending">Pending</option>
              <option value="Paid">Paid</option>
            </select>
          </div>
          <div class="md:col-span-2 mt-4">
            <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700">Create Invoice</button>
          </div>
        </form>
      </div>

      <div class="mb-6">
        <input type="text" id="searchInput" 
               class="w-full max-w-md border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-indigo-500"
               placeholder="🔍 Search by deal name or status...">
      </div>

      <h2 class="text-2xl font-bold mb-4">All Invoices</h2>
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full" id="invoicesTable">
          <thead class="bg-gray-50">
            <tr>
              <th class="text-left p-4">Deal Name</th>
              <th class="text-right p-4">Amount (RM)</th>
              <th class="text-center p-4">Due Date</th>
              <th class="text-center p-4">Status</th>
              <th class="text-center p-4">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

    window.logout = async () => { await signOut(auth); window.location.href = "index.html"; };
    window.goTo = (page) => window.location.href = page;

    let dealsMap = {};   // 用來存 dealId → deal title

    // 載入所有 Deals 建立對照表
    onSnapshot(collection(db, "deals"), (snapshot) => {
      dealsMap = {};
      const select = document.getElementById("dealId");
      select.innerHTML = '<option value="">-- Select Deal --</option>';

      snapshot.forEach(doc => {
        const data = doc.data();
        dealsMap[doc.id] = data.title || "Unknown Deal";
        
        const option = document.createElement("option");
        option.value = doc.id;
        option.textContent = data.title + (data.value ? ` (RM ${data.value.toLocaleString()})` : '');
        select.appendChild(option);
      });
    });

    // Save Invoice
    document.getElementById("invoiceForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await addDoc(collection(db, "invoices"), {
          dealId: document.getElementById("dealId").value,
          amount: parseFloat(document.getElementById("amount").value),
          dueDate: document.getElementById("dueDate").value,
          status: document.getElementById("status").value,
          createdAt: serverTimestamp(),
          userId: auth.currentUser.uid
        });
        alert("✅ Invoice created successfully!");
        e.target.reset();
      } catch (error) { 
        alert("Error: " + error.message); 
      }
    });

    // Display Invoices with Deal Name
    const tbody = document.querySelector("#invoicesTable tbody");
    const searchInput = document.getElementById("searchInput");
    let allInvoices = [];

    onSnapshot(collection(db, "invoices"), (snapshot) => {
      allInvoices = [];
      snapshot.forEach(doc => allInvoices.push({ id: doc.id, ...doc.data() }));
      renderInvoices(allInvoices);
    });

    function renderInvoices(invoices) {
      tbody.innerHTML = "";
      invoices.forEach(item => {
        const dealName = dealsMap[item.dealId] || "Unknown Deal";
        
        const row = document.createElement("tr");
        row.className = "hover:bg-gray-50";
        
        const statusClass = item.status === "Paid" ? "bg-green-100 text-green-700" : "bg-yellow-100 text-yellow-700";

        row.innerHTML = `
          <td class="p-4">${dealName}</td>
          <td class="p-4 text-right font-medium">RM ${item.amount ? item.amount.toLocaleString() : '0'}</td>
          <td class="p-4 text-center">${item.dueDate || '-'}</td>
          <td class="p-4 text-center">
            <span class="px-4 py-1 rounded-full text-sm font-medium ${statusClass}">${item.status}</span>
          </td>
          <td class="p-4 text-center">
            <button onclick="deleteInvoice('${item.id}')" class="text-red-600 hover:text-red-800">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase();
      const filtered = allInvoices.filter(i => 
        (dealsMap[i.dealId] && dealsMap[i.dealId].toLowerCase().includes(term)) ||
        (i.status && i.status.toLowerCase().includes(term))
      );
      renderInvoices(filtered);
    });

    window.deleteInvoice = async (id) => {
      if (confirm("Delete this invoice?")) {
        await deleteDoc(doc(db, "invoices", id));
      }
    };
  </script>
</body>
</html>
